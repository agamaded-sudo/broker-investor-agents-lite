business_model:
  business_model_type: retail_membership
  summary: Costco operates membership-based warehouse clubs, generating revenue from merchandise sales and high-margin membership fees. The business is characterized by low gross margins, high inventory turnover, strong customer loyalty, recurring membership renewal economics, and disciplined cost control.
  revenue_model:
    - Warehouse merchandise sales at disciplined low markups.
    - Recurring annual membership fees.
    - Ancillary services and international warehouse operations.
  neutral_observations:
    - Membership renewal and customer loyalty support recurring economics.
    - Low margins require strong inventory turnover and operating discipline.
    - Growth depends on comparable sales, warehouse expansion, and membership growth.

