business_model:
  summary: Apple designs, manufactures, and sells smartphones, personal computers, tablets, wearables, accessories, and related services. Revenue is driven by hardware product sales and an expanding services ecosystem.
  revenue_model:
    - Hardware product sales across iPhone, Mac, iPad, and wearables.
    - Services revenue from App Store, subscriptions, licensing, AppleCare, payments, and cloud services.
    - Accessories and ecosystem-adjacent products.
  neutral_observations:
    - iPhone remains the largest reported product category.
    - Services revenue is a major recurring ecosystem contributor.
    - Product cycles, geographic demand, and services growth remain important monitoring areas.

