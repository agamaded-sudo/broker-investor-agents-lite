schema_name: source_confidence_schema
version: 1
description: Confidence and provenance contract for sourced research fields.

required_fields:
  - source_id
  - source_name
  - source_type
  - retrieved_at
  - confidence
  - freshness
  - notes

source_type:
  allowed:
    - regulator
    - company
    - exchange
    - vendor
    - secondary
    - analyst_estimate
    - derived

confidence:
  min: 0.0
  max: 1.0
  bands:
    high: ">= 0.85"
    medium: ">= 0.65 and < 0.85"
    low: "< 0.65"

freshness:
  allowed:
    - current
    - stale
    - historical
    - unknown

derived_fields:
  require_formula: true
  require_input_refs: true
